<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AEC Election Results</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header>
    <h1>Australian Election Results</h1>
    <p id="election-label" class="election-label"></p>
  </header>

  <main>
    <div id="status" class="status">Loading results…</div>

    <div class="table-wrapper">
      <table id="results-table" aria-label="House of Representatives Contest Results" style="table-layout:fixed;">
        <thead>
          <tr>
            <th rowspan="2" class="col-contest sticky-col" data-sort-key="contestName">Contest</th>
            <th rowspan="2" class="col-state" data-sort-key="state">State</th>
            <th rowspan="2" class="col-enrolment" data-sort-key="enrolment">Enrolment</th>
            <th colspan="3" class="group-tcp" id="tcp-header-cell" style="position:relative;">
              <button id="tcp-candidate-picker" class="tcp-picker-btn" aria-haspopup="listbox" aria-expanded="false" aria-label="TCP Candidate" type="button">ALP TCP <span class="tcp-caret">&#9660;</span></button>
              <div id="tcp-candidate-menu" class="tcp-menu" role="listbox" tabindex="-1" aria-hidden="true"></div>
            </th>
            <th colspan="5" class="group-primary-pct">Primary %</th>
            <th colspan="4" class="group-swing">Primary Swing</th>
            <th colspan="3" class="group-booths">Booths</th>
          </tr>
          <tr>
            <!-- ALP TCP -->
            <th class="col-num group-tcp col-party-alp" data-sort-key="alpTcpPct">%</th>
            <th class="col-num group-tcp col-party-alp" data-sort-key="alpTcpSwing">Swing</th>
            <th class="col-num group-tcp col-party-alp" data-sort-key="alpTcpPrediction">Prediction</th>
            <!-- Primary % -->
            <th class="col-num group-primary-pct col-party-alp" data-sort-key="alpPct">ALP</th>
            <th class="col-num group-primary-pct col-party-lnp" data-sort-key="lnpPct">L/NP</th>
            <th class="col-num group-primary-pct col-party-grn" data-sort-key="grnPct">GRN</th>
            <th class="col-num group-primary-pct col-party-onp" data-sort-key="onpPct">ONP</th>
            <th class="col-num group-primary-pct col-party-oth" data-sort-key="othPct">OTH</th>
            <!-- Primary Swing -->
            <th class="col-num group-swing col-party-alp" data-sort-key="alpSwing">ALP</th>
            <th class="col-num group-swing col-party-lnp" data-sort-key="lnpSwing">L/NP</th>
            <th class="col-num group-swing col-party-grn" data-sort-key="grnSwing">GRN</th>
            <th class="col-num group-swing col-party-onp" data-sort-key="onpSwing">ONP</th>
            <!-- Booths -->
            <th class="col-num group-booths" data-sort-key="totalBooths">Total</th>
            <th class="col-num group-booths" data-sort-key="primaryBooths">Primary</th>
            <th class="col-num group-booths" data-sort-key="tcpBooths">TCP</th>
          </tr>

        </thead>
        <tbody id="results-body">
        </tbody>
      </table>
    </div>
    <div class="table-filter-bar-wrapper">
      <table id="filter-bar-table" style="table-layout:fixed;">
        <tr id="filter-row">
          <td class="col-contest sticky-col"><input id="filter-contest" type="text" placeholder="Search contest" autocomplete="off" /></td>
          <td class="col-state"><input id="filter-state" type="text" placeholder="State" autocomplete="off" /></td>
          <td class="col-enrolment"></td>
          <td class="col-num group-tcp col-party-alp" id="total-alpTcpPct"></td>
          <td class="col-num group-tcp col-party-alp" id="total-alpTcpSwing"></td>
          <td class="col-num group-tcp col-party-alp" id="total-alpTcpPrediction"></td>
          <td class="col-num group-primary-pct col-party-alp" id="total-alpPct"></td>
          <td class="col-num group-primary-pct col-party-lnp" id="total-lnpPct"></td>
          <td class="col-num group-primary-pct col-party-grn" id="total-grnPct"></td>
          <td class="col-num group-primary-pct col-party-onp" id="total-onpPct"></td>
          <td class="col-num group-primary-pct col-party-oth" id="total-othPct"></td>
          <td class="col-num group-swing col-party-alp" id="total-alpSwing"></td>
          <td class="col-num group-swing col-party-lnp" id="total-lnpSwing"></td>
          <td class="col-num group-swing col-party-grn" id="total-grnSwing"></td>
          <td class="col-num group-swing col-party-onp" id="total-onpSwing"></td>
          <td class="col-num group-booths" id="total-totalBooths"></td>
          <td class="col-num group-booths" id="total-primaryBooths"></td>
          <td class="col-num group-booths" id="total-tcpBooths"></td>
        </tr>
      </table>
    </div>
  </main>

  <footer>
    <p>Source: <a href="https://results.aec.gov.au/">Australian Electoral Commission media feed data</a>. Code: <a href="https://github.com/jwood74/aus-election-results">GitHub</a></p>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
