<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AEC Election Results</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header>
    <h1>Australian Election Results</h1>
    <p id="election-label" class="election-label"></p>
  </header>

  <main>
    <div id="status" class="status">Loading results…</div>

    <div class="table-wrapper">
      <table id="results-table" aria-label="House of Representatives Contest Results">
        <thead>
          <tr>
            <th rowspan="2" class="col-contest sticky-col" data-sort-key="contestName">Contest</th>
            <th rowspan="2" class="col-state" data-sort-key="state">State</th>
            <th rowspan="2" class="col-enrolment" data-sort-key="enrolment">Enrolment</th>
            <th colspan="2" class="group-tcp">ALP TCP</th>
            <th colspan="5" class="group-primary-pct">Primary %</th>
            <th colspan="4" class="group-swing">Primary Swing</th>
            <th colspan="3" class="group-booths">Booths</th>
          </tr>
          <tr>
            <!-- ALP TCP -->
            <th class="col-num group-tcp col-party-alp" data-sort-key="alpTcpPct">%</th>
            <th class="col-num group-tcp col-party-alp" data-sort-key="alpTcpSwing">Swing</th>
            <!-- Primary % -->
            <th class="col-num group-primary-pct col-party-alp" data-sort-key="alpPct">ALP</th>
            <th class="col-num group-primary-pct col-party-lnp" data-sort-key="lnpPct">L/NP</th>
            <th class="col-num group-primary-pct col-party-grn" data-sort-key="grnPct">GRN</th>
            <th class="col-num group-primary-pct col-party-onp" data-sort-key="onpPct">ONP</th>
            <th class="col-num group-primary-pct col-party-oth" data-sort-key="othPct">OTH</th>
            <!-- Primary Swing -->
            <th class="col-num group-swing col-party-alp" data-sort-key="alpSwing">ALP</th>
            <th class="col-num group-swing col-party-lnp" data-sort-key="lnpSwing">L/NP</th>
            <th class="col-num group-swing col-party-grn" data-sort-key="grnSwing">GRN</th>
            <th class="col-num group-swing col-party-onp" data-sort-key="onpSwing">ONP</th>
            <!-- Booths -->
            <th class="col-num group-booths" data-sort-key="totalBooths">Total</th>
            <th class="col-num group-booths" data-sort-key="primaryBooths">Primary</th>
            <th class="col-num group-booths" data-sort-key="tcpBooths">TCP</th>
          </tr>
        </thead>
        <tbody id="results-body">
        </tbody>
      </table>
    </div>
  </main>

  <footer>
    <p>Source: Australian Electoral Commission media feed data. Code: <a href="https://github.com/jwood74/aus-election-results">GitHub</a></p>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
