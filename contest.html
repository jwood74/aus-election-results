<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contest Detail — AEC Election Results</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header>
    <h1>Australian Election Results</h1>
    <p id="election-label" class="election-label"></p>
  </header>

  <main>
    <div class="breadcrumb" style="display: flex; align-items: center; justify-content: flex-start; gap: 1.5em;">
      <a href="index.html" class="back-link">← All Contests</a>
      <span id="contest-label" style="flex: 1; text-align: center; font-size: 1.2em; font-weight: 500;"></span>
    </div>


    <div id="status" class="status">Loading results…</div>

    <div class="table-wrapper">
      <table id="results-table" aria-label="Polling Place Results">
        <thead>
          <tr>
            <th rowspan="2" class="col-contest sticky-col" data-sort-key="name">Polling Place</th>
            <th rowspan="2" class="col-num" data-sort-key="expectedVotes">Expected<br>Votes</th>
            <th rowspan="2" class="col-num" data-sort-key="votesCast">Votes<br>Cast</th>
            <th colspan="2" class="group-tcp">ALP TCP</th>
            <th colspan="5" class="group-primary-pct">Primary %</th>
            <th colspan="4" class="group-swing">Primary Swing</th>
            <th colspan="2" class="group-flow">Pref Flow</th>
          </tr>
          <tr>
            <!-- ALP TCP -->
            <th class="col-num group-tcp col-party-alp" data-sort-key="alpTcpPct">%</th>
            <th class="col-num group-tcp col-party-alp" data-sort-key="alpTcpSwing">Swing</th>
            <!-- Primary % -->
            <th class="col-num group-primary-pct col-party-alp" data-sort-key="alpPct">ALP</th>
            <th class="col-num group-primary-pct col-party-lnp" data-sort-key="lnpPct">L/NP</th>
            <th class="col-num group-primary-pct col-party-grn" data-sort-key="grnPct">GRN</th>
            <th class="col-num group-primary-pct col-party-onp" data-sort-key="onpPct">ONP</th>
            <th class="col-num group-primary-pct col-party-oth" data-sort-key="othPct">OTH</th>
            <!-- Primary Swing -->
            <th class="col-num group-swing col-party-alp" data-sort-key="alpSwing">ALP</th>
            <th class="col-num group-swing col-party-lnp" data-sort-key="lnpSwing">L/NP</th>
            <th class="col-num group-swing col-party-grn" data-sort-key="grnSwing">GRN</th>
            <th class="col-num group-swing col-party-onp" data-sort-key="onpSwing">ONP</th>
            <!-- Preference Flow -->
            <th class="col-num group-flow col-party-alp" data-sort-key="flowAlp">→ ALP</th>
            <th class="col-num group-flow col-party-lnp" data-sort-key="flowLnp">→ L/NP</th>
          </tr>
          <tr id="totals-row" class="totals-row"></tr>
        </thead>
        <tbody id="results-body">
        </tbody>
      </table>
    </div>
  </main>

  <footer>
    <p>Source: <a href="https://results.aec.gov.au/">Australian Electoral Commission media feed data</a>. Code: <a href="https://github.com/jwood74/aus-election-results">GitHub</a></p>
  </footer>

  <script src="js/contest.js"></script>
</body>
</html>
